<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 台紙（full-bleed・不透明。角丸はOS任せ） -->
  <rect width="512" height="512" fill="#EFE8D8"/>
  <rect width="512" height="512" fill="url(#grain)" opacity=".35"/>
  <defs>
    <linearGradient id="grain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".5"/>
      <stop offset=".4" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#C9BC9E" stop-opacity=".28"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E3ECD8"/>
      <stop offset="1" stop-color="#C2D6AE"/>
    </linearGradient>
  </defs>

  <!-- ネガフィルムの帯（現像の記号・背景） -->
  <g transform="rotate(-10 256 400)">
    <rect x="-40" y="360" width="592" height="86" fill="#211E1A"/>
    <g fill="#EFE8D8" opacity=".92">
      <rect x="8"   y="368" width="15" height="11" rx="2"/><rect x="44"  y="368" width="15" height="11" rx="2"/>
      <rect x="80"  y="368" width="15" height="11" rx="2"/><rect x="116" y="368" width="15" height="11" rx="2"/>
      <rect x="152" y="368" width="15" height="11" rx="2"/><rect x="188" y="368" width="15" height="11" rx="2"/>
      <rect x="224" y="368" width="15" height="11" rx="2"/><rect x="260" y="368" width="15" height="11" rx="2"/>
      <rect x="296" y="368" width="15" height="11" rx="2"/><rect x="332" y="368" width="15" height="11" rx="2"/>
      <rect x="368" y="368" width="15" height="11" rx="2"/><rect x="404" y="368" width="15" height="11" rx="2"/>
      <rect x="440" y="368" width="15" height="11" rx="2"/><rect x="476" y="368" width="15" height="11" rx="2"/>
      <rect x="8"   y="427" width="15" height="11" rx="2"/><rect x="44"  y="427" width="15" height="11" rx="2"/>
      <rect x="80"  y="427" width="15" height="11" rx="2"/><rect x="116" y="427" width="15" height="11" rx="2"/>
      <rect x="152" y="427" width="15" height="11" rx="2"/><rect x="188" y="427" width="15" height="11" rx="2"/>
      <rect x="224" y="427" width="15" height="11" rx="2"/><rect x="260" y="427" width="15" height="11" rx="2"/>
      <rect x="296" y="427" width="15" height="11" rx="2"/><rect x="332" y="427" width="15" height="11" rx="2"/>
      <rect x="368" y="427" width="15" height="11" rx="2"/><rect x="404" y="427" width="15" height="11" rx="2"/>
      <rect x="440" y="427" width="15" height="11" rx="2"/><rect x="476" y="427" width="15" height="11" rx="2"/>
    </g>
  </g>

  <!-- チェキプリント -->
  <g transform="rotate(-5 256 236)">
    <rect x="126" y="66" width="260" height="340" fill="#3A352E" opacity=".22" transform="translate(7 12)"/>
    <rect x="126" y="66" width="260" height="340" fill="#FFFEF9"/>
    <!-- 写真エリア（山の絵） -->
    <g>
      <rect x="146" y="88" width="220" height="252" fill="url(#sky)"/>
      <circle cx="316" cy="136" r="26" fill="#E9B84C"/>
      <path d="M146 340 L146 250 L196 196 L242 248 L296 178 L346 240 L366 216 L366 340 Z" fill="#7FA268"/>
      <path d="M146 340 L146 292 L206 316 L268 258 L330 318 L366 284 L366 340 Z" fill="#4F6D3A"/>
      <!-- フィルム日付の焼き込み -->
      <text x="354" y="330" text-anchor="end" font-family="Consolas, monospace" font-size="30" font-weight="700"
            fill="#FF9430" opacity=".95">'26</text>
      <rect x="146" y="88" width="220" height="252" fill="none" stroke="#3A352E" stroke-opacity=".14" stroke-width="2"/>
    </g>
    <!-- 下縁の青ペン書き（手書きの一筆） -->
    <path d="M170 375 q 22 -10 44 0 t 44 0 t 44 0 t 30 -4" fill="none" stroke="#3C5872" stroke-width="7"
          stroke-linecap="round" opacity=".85"/>
  </g>

  <!-- マスキングテープ -->
  <g transform="rotate(-3 256 74)">
    <rect x="196" y="52" width="120" height="40" fill="#D6B160" opacity=".78"/>
    <rect x="196" y="52" width="120" height="40" fill="#FFFFFF" opacity=".14"/>
  </g>
</svg>
